<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StaffWatch — Login</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080c14;--bg2:#0d1420;--bg3:#121b2e;
  --panel:#0f1a2e;--border:#1e3050;--border2:#254070;
  --accent:#00e5ff;--danger:#ef4444;
  --text:#e2e8f0;--muted:#64748b;--muted2:#94a3b8;
}
[data-theme="light"]{
  --bg:#f0f4f8;--bg2:#ffffff;--bg3:#e8edf5;
  --panel:#ffffff;--border:#d1dae8;--border2:#b0c0d8;
  --accent:#0077aa;--danger:#dc2626;
  --text:#1e293b;--muted:#94a3b8;--muted2:#64748b;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden;transition:background .25s}

body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,0.004) 2px,rgba(0,229,255,0.004) 4px);pointer-events:none}
[data-theme="light"] body::before{display:none}
.orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:0.07;pointer-events:none}
.orb1{width:500px;height:500px;background:radial-gradient(circle,#00e5ff,transparent);top:-100px;left:-100px}
.orb2{width:400px;height:400px;background:radial-gradient(circle,#7c3aed,transparent);bottom:-80px;right:-80px}
[data-theme="light"] .orb{opacity:0.04}

.card{
  position:relative;z-index:1;
  background:var(--panel);border:1px solid var(--border2);border-radius:16px;
  padding:40px 44px 44px;width:380px;
  box-shadow:0 20px 60px rgba(0,0,0,0.2);transition:background .25s,border-color .25s;
}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;letter-spacing:-0.5px;color:var(--text);text-align:center;margin-bottom:6px}
.logo span{color:var(--accent)}
.subtitle{text-align:center;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:36px}
.form-group{margin-bottom:20px}
.form-label{display:block;font-size:11px;font-weight:600;color:var(--muted2);letter-spacing:0.5px;margin-bottom:8px;text-transform:uppercase}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:.2s}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,255,0.08)}
[data-theme="light"] .form-input:focus{box-shadow:0 0 0 3px rgba(0,119,170,0.08)}
.btn-login{width:100%;padding:13px;border:none;border-radius:8px;background:linear-gradient(135deg,rgba(0,229,255,0.2),rgba(0,229,255,0.1));border:1px solid rgba(0,229,255,0.35);color:var(--accent);font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;letter-spacing:0.5px;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px}
[data-theme="light"] .btn-login{background:rgba(0,119,170,0.1);border-color:rgba(0,119,170,0.3)}
.btn-login:hover{background:linear-gradient(135deg,rgba(0,229,255,0.3),rgba(0,229,255,0.18));box-shadow:0 0 20px rgba(0,229,255,0.15)}
.btn-login:disabled{opacity:0.5;cursor:not-allowed}
.error-msg{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#f87171;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:18px;display:none;text-align:center}
.lock-icon{width:44px;height:44px;margin:0 auto 20px;background:rgba(0,229,255,0.08);border:1px solid rgba(0,229,255,0.2);border-radius:12px;display:flex;align-items:center;justify-content:center}
.spinner{width:16px;height:16px;border:2px solid rgba(0,229,255,0.3);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
/* Theme toggle on login */
.theme-row{display:flex;justify-content:center;margin-bottom:24px}
.theme-pill{display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 12px;border:1px solid var(--border);border-radius:20px;background:var(--bg3);font-size:11px;color:var(--muted2);font-weight:600;letter-spacing:0.5px;transition:.2s;user-select:none}
.theme-pill:hover{border-color:var(--accent);color:var(--accent)}
.toggle-track{width:30px;height:16px;border-radius:8px;background:var(--border);position:relative;transition:.3s;flex-shrink:0}
.toggle-thumb{width:12px;height:12px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:.3s}
[data-theme="light"] .toggle-track{background:var(--accent)}
[data-theme="light"] .toggle-thumb{transform:translateX(14px)}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="card">
  <div class="lock-icon">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00e5ff" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
  </div>
  <div class="logo">Staff<span>Watch</span></div>
  <div class="subtitle">Admin Console</div>

  <!-- Theme toggle -->
  <div class="theme-row">
    <div class="theme-pill" onclick="toggleTheme()" id="themePill">
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
      <span id="themeLabel">DARK</span>
    </div>
  </div>

  <div class="error-msg" id="errMsg">Incorrect password. Please try again.</div>

  <div class="form-group">
    <label class="form-label" for="pw">Admin Password</label>
    <input type="password" class="form-input" id="pw" placeholder="Enter password…" autofocus>
  </div>
  <button class="btn-login" id="loginBtn" onclick="doLogin()">
    <div class="spinner" id="spinner"></div>
    <span id="btnText">Sign In</span>
  </button>
</div>

<script>
// Apply saved theme immediately
(function(){
  const t = localStorage.getItem('sw_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeLabel').textContent = t.toUpperCase();
})();

function toggleTheme() {
  const html = document.documentElement;
  const cur  = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', cur);
  document.getElementById('themeLabel').textContent = cur.toUpperCase();
  localStorage.setItem('sw_theme', cur);
}

document.getElementById('pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const pw  = document.getElementById('pw').value.trim();
  const btn = document.getElementById('loginBtn');
  const sp  = document.getElementById('spinner');
  const txt = document.getElementById('btnText');
  const err = document.getElementById('errMsg');
  if (!pw) return;
  btn.disabled = true; sp.style.display = 'block'; txt.textContent = 'Signing in…'; err.style.display = 'none';
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ password: pw })
    });
    if (r.ok) { window.location.href = '/'; return; }
    err.style.display = 'block';
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  } catch(e) {
    err.textContent = 'Connection error. Is the server running?';
    err.style.display = 'block';
  }
  btn.disabled = false; sp.style.display = 'none'; txt.textContent = 'Sign In';
}
</script>
</body>
</html>
